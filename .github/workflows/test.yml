name: Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache system dependencies
        id: cache-sysdeps
        uses: actions/cache@v6
        with:
          path: |
            /var/cache/apt/archives
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/dav1d
            /opt/homebrew/Cellar/dav1d
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: sysdeps-${{ runner.os }}-dav1d-v1-${{ hashFiles('.github/workflows/test.yml') }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          dpkg -s libdav1d-dev >/dev/null 2>&1 || {
            sudo apt-get update && sudo apt-get install -y libdav1d-dev
          }

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list dav1d &>/dev/null || brew install dav1d

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $dav1dLib = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\dav1d.lib"
          if (-not (Test-Path $dav1dLib)) {
            choco install pkgconfiglite -y --no-progress --limit-output
            vcpkg install dav1d
          }
          $vcpkgInstalled = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          echo "PKG_CONFIG_PATH=$vcpkgInstalled\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test
        run: cargo test --verbose
